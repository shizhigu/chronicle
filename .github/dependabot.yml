version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - triage
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    groups:
      react-router:
        patterns:
          - 'react-router'
          - '@react-router/*'
      drizzle:
        patterns:
          - 'drizzle-orm'
          - 'drizzle-kit'
      types:
        patterns:
          - '@types/*'
      dev-tools:
        patterns:
          - '@biomejs/*'
          - 'lefthook'
          - 'typescript'
          - 'vite'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'ci(actions)'
